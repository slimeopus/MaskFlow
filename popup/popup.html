<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MaskFlow</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span>MaskFlow</span>
      </div>
    </header>

    <section class="section master-section">
      <button id="masterToggle" class="master-btn">
        <span class="master-icon" id="masterIcon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <span class="master-text" id="masterText">Скрыть всё на странице</span>
      </button>
    </section>

    <section class="section categories-section">
      <div class="section-label">Категории</div>

      <label class="toggle-row" data-category="balances">
        <span class="toggle-label">
          <span class="toggle-icon">💳</span>
          <span>Балансы и деньги</span>
        </span>
        <div class="toggle-track">
          <input type="checkbox" checked>
          <span class="toggle-knob"></span>
        </div>
      </label>

      <label class="toggle-row" data-category="phones">
        <span class="toggle-label">
          <span class="toggle-icon">📞</span>
          <span>Номера телефонов</span>
        </span>
        <div class="toggle-track">
          <input type="checkbox" checked>
          <span class="toggle-knob"></span>
        </div>
      </label>

      <label class="toggle-row" data-category="emails">
        <span class="toggle-label">
          <span class="toggle-icon">📧</span>
          <span>Адреса почт</span>
        </span>
        <div class="toggle-track">
          <input type="checkbox" checked>
          <span class="toggle-knob"></span>
        </div>
      </label>

      <label class="toggle-row" data-category="messages">
        <span class="toggle-label">
          <span class="toggle-icon">💬</span>
          <span>Переписка</span>
        </span>
        <div class="toggle-track">
          <input type="checkbox" checked>
          <span class="toggle-knob"></span>
        </div>
      </label>

      <label class="toggle-row" data-category="avatars">
        <span class="toggle-label">
          <span class="toggle-icon">🖼</span>
          <span>Аватары и фото</span>
        </span>
        <div class="toggle-track">
          <input type="checkbox" checked>
          <span class="toggle-knob"></span>
        </div>
      </label>
    </section>

    <section class="section features-section">
      <div class="section-label">Возможности</div>

      <label class="toggle-row" id="hoverRevealRow">
        <span class="toggle-label">
          <span class="toggle-icon">🔍</span>
          <span>Показывать по наведению</span>
        </span>
        <div class="toggle-track">
          <input type="checkbox" id="hoverRevealToggle">
          <span class="toggle-knob"></span>
        </div>
      </label>

      <label class="toggle-row" id="blurBrushRow">
        <span class="toggle-label">
          <span class="toggle-icon">🖌</span>
          <span>Размыть область</span>
        </span>
        <div class="toggle-track">
          <input type="checkbox" id="blurBrushToggle">
          <span class="toggle-knob"></span>
        </div>
      </label>
    </section>

    <section class="section auto-section">
      <label class="toggle-row" id="autoBlurRow">
        <span class="toggle-label">
          <span class="toggle-icon">⚙️</span>
          <span>Всегда размывать на этом сайте</span>
        </span>
        <div class="toggle-track">
          <input type="checkbox" id="autoBlurToggle">
          <span class="toggle-knob"></span>
        </div>
      </label>
      <div class="domain-name" id="domainName"></div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
